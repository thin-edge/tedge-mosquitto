name: build
permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  merge_group:

jobs:
  build:
    name: Build (${{ matrix.libc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { libc: musl, dist: dist-musl }
          - { libc: gnu, dist: dist-gnu }

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Zig version
        id: zig-version
        run: echo "version=$(cat .zig-version)" >> "$GITHUB_OUTPUT"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}
          cache-key: build-${{ matrix.libc }}

      - uses: extractions/setup-just@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          install-only: true

      - name: Build packages and tarballs
        run: just build-libc ${{ matrix.libc }}

      - name: Smoke test (broker + client round trip)
        run: just smoke-test --libc ${{ matrix.libc }} --path ${{ matrix.dist }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tedge-mosquitto-${{ matrix.libc }}
          path: ${{ matrix.dist }}/*.*

  build-pass:
    name: Build Pass
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Fail on workflow error
        run: exit 1
        if: >-
          ${{
            contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped')
          }}
