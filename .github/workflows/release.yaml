name: release
permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Zig version
        id: zig-version
        run: echo "version=$(cat .zig-version)" >> "$GITHUB_OUTPUT"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      - uses: extractions/setup-just@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          install-only: true

      # goreleaser derives the version from the pushed tag and creates a draft
      # GitHub release with all packages/tarballs attached. On workflow_dispatch
      # (no tag) it produces a snapshot and does not publish.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just release

      # Publish the linux packages and tarballs to the Cloudsmith repository.
      # PUBLISH_TOKEN is configured as an org-level secret; PUBLISH_OWNER and
      # PUBLISH_REPO default to thinedge/community when the secrets are unset.
      - name: Publish to Linux Repository
        if: startsWith(github.ref, 'refs/tags/') && env.PUBLISH_TOKEN
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          PUBLISH_REPO: ${{ secrets.PUBLISH_REPO }}
          PUBLISH_OWNER: ${{ secrets.PUBLISH_OWNER }}
        run: just publish
