# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
#
# GNU libc (dynamically linked) build.
#
# Runs after .goreleaser.musl.yaml, which creates the release. This config
# publishes its own artifacts onto that same tag via `release.mode: append`
# (see the `release` recipe in the justfile).
#
# NOTE: OSS GoReleaser has no `includes:`, so the shared scaffolding (snapshot /
# before hooks and the whole nfpm package definition) is duplicated from
# .goreleaser.musl.yaml. Keep the two in sync — a `diff` between them should
# show only the intended musl/gnu differences (targets, package-name suffix,
# and the gnu-only shared-OpenSSL files).
version: 2
# The -gnu suffix lives in the project name so every archive/package template
# below is just `{{ .ProjectName }}`. Set PACKAGE_NAME to override the whole base
# name (e.g. the no-TLS build uses tedge-mosquitto-notls-gnu; see the justfile).
project_name: tedge-mosquitto-gnu

# Write to a separate dir so a gnu build and a musl build (which uses the default
# ./dist) can coexist on one machine — the release flow builds both, and `just
# publish` uploads both dirs to the package repository.
dist: dist-gnu

# Append this config's artifacts to the release the musl config already created
# for this tag (matched by tag; repo owner/name auto-detected from the git
# remote). mode: append would otherwise also append this run's changelog to the
# release body, so the changelog is disabled below to keep musl's single copy.
release:
  mode: append

changelog:
  disable: true

snapshot:
  version_template: "{{ .Version }}"

before:
  hooks:
    # WORKAROUND: manually create zig fetch cache folder. Remove once https://codeberg.org/ziglang/zig/issues/35264
    # next ziglang version is released
    - sh -xc 'mkdir -p $(zig env | grep .global_cache_dir | cut -d\" -f2)/tmp'
    # fetch the dependencies up-front to reduce race conditions when building multiple targets
    - sh -c 'cd ./src && zig build --fetch=all'

# OPENSSL selects how OpenSSL is linked into the GNU binaries (see build.zig):
#   - static (default): ~3MB of OpenSSL bundled into every binary.
#   - shared: one libssl.so.3/libcrypto.so.3 built & shipped to
#     /usr/lib/mosquitto, shared by all binaries via rpath (much smaller, still
#     self-contained, works cross-compiled). The .so files are added to the
#     package/archive below.
#   - system: link the target's system OpenSSL (native builds only).
builds:
  - &build-default
    id:  mosquitto
    builder: zig
    binary: mosquitto
    targets:
      # Zig defaults to glibc 2.17 for x86_64/aarch64/arm and 2.27 for riscv64,
      # which are already conservative maximally-compatible minimums.
      - x86_64-linux-gnu
      - aarch64-linux-gnu
      - arm-linux-gnueabihf
      - riscv64-linux-gnu
    dir: ./src
    tool: zig
    flags:
      - --release=small
      - -Doptimize=ReleaseSmall
      - -DWITH_TLS={{ eq (envOrDefault "WITH_TLS" "true") "true" }}
      - -DOPENSSL={{ envOrDefault "OPENSSL" "shared" }}
  - &build-armv6
    # armv6 gnu
    id:  mosquitto-armv6
    <<: *build-default
    targets:
      - arm-linux-gnueabi
    flags:
      - --release=small
      - -Doptimize=ReleaseSmall
      - -DWITH_TLS={{ eq (envOrDefault "WITH_TLS" "true") "true" }}
      - -DOPENSSL={{ envOrDefault "OPENSSL" "shared" }}
      - -Dcpu=arm1176jzf_s

archives:
  - id:  mosquitto-archive
    ids:
      -  mosquitto
    formats:
      - tar.gz
    name_template: '{{ envOrDefault "PACKAGE_NAME" .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ .Arm }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    # shared OpenSSL (only present when OPENSSL=shared; rpath finds them under
    # lib/) plus the CLI tools at the archive root. Anchor reused by the armv6
    # archive.
    files: &archive-files
      - src: 'src/zig-out/{{ .Target }}/lib/libcrypto.so.3'
        dst: lib/
        strip_parent: true
      - src: 'src/zig-out/{{ .Target }}/lib/libssl.so.3'
        dst: lib/
        strip_parent: true
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_pub'
        dst: .
        strip_parent: true
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_sub'
        dst: .
        strip_parent: true
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_rr'
        dst: .
        strip_parent: true
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_passwd'
        dst: .
        strip_parent: true
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_ctrl'
        dst: .
        strip_parent: true
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_db_dump'
        dst: .
        strip_parent: true
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_signal'
        dst: .
        strip_parent: true

  - id:  mosquitto-archive-armv6
    ids:
      -  mosquitto-armv6
    formats:
      - tar.gz
    name_template: '{{ envOrDefault "PACKAGE_NAME" .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ .Arm }}{{ end }}v6{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    files: *archive-files

nfpms:
  - &linux-package-defaults
    id:  mosquitto-linux-packages
    ids:
      -  mosquitto

    package_name: '{{ envOrDefault "PACKAGE_NAME" .ProjectName }}'
    file_name_template: '{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    vendor: thin-edge.io
    homepage: https://thin-edge.io
    maintainer: thin-edge.io <info@thin-edge.io>
    license: BSD
    description: |
      An Open Source MQTT v3.1/v3.1.1 Broker

      Mosquitto is an open source message broker that implements the MQ Telemetry
      Transport protocol version 3.1 and 3.1.1 MQTT provides a lightweight method
      of carrying out messaging using a publish/subscribe model. This makes it
      suitable for "machine to machine" messaging such as with low power sensors
      or mobile devices such as phones, embedded computers or micro-controllers
      like the Arduino.

      This is the thin-edge.io flavoured mosquitto build, dynamically linked
      against glibc and shipped with sensible defaults for edge devices.

    formats:
      - apk
      - deb
      - rpm
      - termux.deb
      - archlinux
      - ipk

    provides:
      - mosquitto
      - mosquitto-clients

    replaces:
      - mosquitto
      - mosquitto-clients

    conflicts:
      - mosquitto
      - mosquitto-clients

    # Path that the binaries should be installed.
    bindir: /usr/sbin
    version_metadata: git
    section: default
    priority: extra

    # GNU builds are dynamically linked; ship the shared OpenSSL where the
    # binaries' rpath looks, alongside the common contents.
    contents:
      # shared OpenSSL — only present when OPENSSL=shared.
      - src: 'src/zig-out/{{ .Target }}/lib/libcrypto.so.3'
        dst: /usr/lib/mosquitto/libcrypto.so.3
      - src: 'src/zig-out/{{ .Target }}/lib/libssl.so.3'
        dst: /usr/lib/mosquitto/libssl.so.3

      - src: packaging/conf/certs/README
        dst: /etc/mosquitto/certs/README

      - src: packaging/conf/ca_certificates/README
        dst: /etc/mosquitto/ca_certificates/README

      - src: packaging/conf/mosquitto.conf
        dst: /etc/mosquitto/mosquitto.conf
        type: config

      # sensible thin-edge.io defaults, dropped into the include dir so a user's
      # own /etc/mosquitto/mosquitto.conf edits are never clobbered on upgrade.
      - src: packaging/conf/conf.d/10_buffer.conf
        dst: /etc/mosquitto/conf.d/10_buffer.conf
        type: config

      - src: packaging/conf/conf.d/20_logging.conf
        dst: /etc/mosquitto/conf.d/20_logging.conf
        type: config

      # - src: packaging/conf/conf.d/30_local_listener.conf
      #   dst: /etc/mosquitto/conf.d/30_local_listener.conf
      #   type: config

      - src: packaging/conf/conf.d/README
        dst: /etc/mosquitto/conf.d/README

      # systemd definition
      - src: packaging/services/systemd/mosquitto.service
        dst: /usr/lib/systemd/system/mosquitto.service
        file_info:
          mode: 0644

      # sysvinit definition
      - src: packaging/services/sysvinit/mosquitto
        dst: /usr/lib/tedge-services/sysvinit/mosquitto
        file_info:
          mode: 0755

      # mosquitto CLI tools — byproducts of the broker's `zig build`, found in
      # zig-out/<target>/bin/. mosquitto_passwd and mosquitto_ctrl require
      # WITH_TLS=true.
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_pub'
        dst: /usr/bin/mosquitto_pub
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_sub'
        dst: /usr/bin/mosquitto_sub
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_rr'
        dst: /usr/bin/mosquitto_rr
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_passwd'
        dst: /usr/bin/mosquitto_passwd
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_ctrl'
        dst: /usr/bin/mosquitto_ctrl
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_db_dump'
        dst: /usr/bin/mosquitto_db_dump
      - src: 'src/zig-out/{{ .Target }}/bin/mosquitto_signal'
        dst: /usr/bin/mosquitto_signal

    scripts:
      preinstall: ./packaging/scripts/preinstall.sh
      postinstall: ./packaging/scripts/postinstall.sh
      preremove: ./packaging/scripts/preremove.sh
      postremove: ./packaging/scripts/postremove.sh

  - #
    <<: *linux-package-defaults
    id:  mosquitto-linux-packages-armv6
    ids:
      -  mosquitto-armv6
    file_name_template: '{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}v6{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
